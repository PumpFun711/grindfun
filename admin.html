<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GrindFun — Admin</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--green:#00ff88;--gold:#ffd700;}
    body{background:#07070f;color:#fff;font-family:'Courier New',monospace;min-height:100vh;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(8,8,18,0.95);border-bottom:1px solid rgba(0,255,136,0.12);}
    .nav-logo{font-weight:900;font-size:18px;color:#fff;letter-spacing:3px;text-decoration:none;}
    .nav-logo span{color:var(--green);}

    /* LOGIN */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);}
    .login-box{background:#0a0a18;border:1px solid rgba(0,255,136,0.2);border-radius:12px;padding:40px;width:90%;max-width:380px;text-align:center;}
    .login-box h2{color:#fff;font-size:20px;margin-bottom:8px;letter-spacing:2px;}
    .login-box p{color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:24px;}
    .login-box input{width:100%;background:#080814;border:1px solid rgba(255,255,255,0.12);color:#fff;padding:12px 14px;border-radius:5px;font-family:'Courier New',monospace;font-size:14px;outline:none;margin-bottom:12px;}
    .login-box input:focus{border-color:rgba(0,255,136,0.5);}
    .btn-login{width:100%;background:var(--green);color:#000;border:none;padding:13px;border-radius:5px;font-weight:900;font-size:14px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:1px;}
    .btn-login:hover{background:#00cc66;}
    .login-err{color:#ff4444;font-size:12px;margin-top:8px;display:none;}

    /* DASHBOARD */
    #dashboard{display:none;padding:32px;}
    .dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
    .dash-title{font-size:20px;font-weight:900;letter-spacing:2px;}
    .dash-title span{color:var(--green);}
    .dash-actions{display:flex;gap:10px;}
    .btn-action{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);padding:8px 18px;border-radius:4px;font-size:12px;cursor:pointer;font-family:'Courier New',monospace;font-weight:700;transition:background .2s;}
    .btn-action:hover{background:rgba(0,255,136,0.2);}
    .btn-danger{background:rgba(255,0,0,0.1);border:1px solid rgba(255,0,0,0.3);color:#ff4444;}
    .btn-danger:hover{background:rgba(255,0,0,0.2);}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px;}
    .stat-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:20px;text-align:center;}
    .stat-box .val{font-size:28px;font-weight:900;color:var(--green);}
    .stat-box .lbl{font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}

    /* SEARCH */
    .search-row{display:flex;gap:10px;margin-bottom:20px;}
    .search-row input{flex:1;background:#080814;border:1px solid rgba(255,255,255,0.12);color:#fff;padding:10px 14px;border-radius:5px;font-family:'Courier New',monospace;font-size:13px;outline:none;}
    .search-row input:focus{border-color:rgba(0,255,136,0.4);}

    /* TABLE */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{text-align:left;padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(0,255,136,0.5);border-bottom:1px solid rgba(0,255,136,0.15);white-space:nowrap;}
    td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
    tr:hover td{background:rgba(255,255,255,0.02);}
    .wallet-cell{font-size:11px;color:rgba(255,255,255,0.5);font-family:'Courier New',monospace;}
    .pts-cell{color:var(--gold);font-weight:700;}
    .pick-cell{font-size:11px;}
    .time-cell{color:rgba(255,255,255,0.3);font-size:11px;}
    .copy-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:3px 8px;border-radius:3px;font-size:10px;cursor:pointer;font-family:'Courier New',monospace;transition:all .15s;}
    .copy-btn:hover{border-color:var(--green);color:var(--green);}

    /* Toast */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0e0e20;border:1px solid rgba(0,255,136,0.3);color:#fff;font-size:13px;padding:10px 24px;border-radius:6px;transition:transform .3s;pointer-events:none;z-index:999;}
    #toast.show{transform:translateX(-50%) translateY(0);}

    .loading{text-align:center;padding:40px;color:rgba(255,255,255,0.3);}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">GRIND<span>FUN</span> ADMIN</a>
</nav>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>⛏ ADMIN ACCESS</h2>
    <p>Enter your admin password to continue</p>
    <input type="password" id="admin-pass" placeholder="Admin password..." onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-login" onclick="login()">LOGIN →</button>
    <div class="login-err" id="login-err">❌ Wrong password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-title">⛏ GRIND<span>FUN</span> ADMIN</div>
    <div class="dash-actions">
      <button class="btn-action" onclick="exportWallets()">📋 Export Wallets (Airdrop)</button>
      <button class="btn-action" onclick="exportCSV()">⬇️ Export CSV</button>
      <button class="btn-action" onclick="fetchPlayers()">🔄 Refresh</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="val" id="d-players">-</div><div class="lbl">Total Players</div></div>
    <div class="stat-box"><div class="val" id="d-points">-</div><div class="lbl">Total Points</div></div>
    <div class="stat-box"><div class="val" id="d-blocks">-</div><div class="lbl">Blocks Mined</div></div>
    <div class="stat-box"><div class="val" id="d-diamond">-</div><div class="lbl">Diamond+ Picks</div></div>
  </div>

  <div class="search-row">
    <input type="text" id="search" placeholder="Search by nickname or wallet..." oninput="renderTable()"/>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nickname</th>
          <th>Wallet Address</th>
          <th>Points</th>
          <th>Pickaxe</th>
          <th>Blocks</th>
          <th>Last Seen</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="player-table">
        <tr><td colspan="8" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script>
  let adminPass = '';
  let players   = [];

  const PICK_NAMES  = ['Wood','Stone','Iron','Gold','Diamond','$GRINDFUN'];
  const PICK_COLORS = ['#c8a060','#aaaaaa','#d4d4d4','#ffd700','#4fc3f7','#00ff88'];

  async function login() {
    const pass = document.getElementById('admin-pass').value;
    const res  = await fetch('/api/admin/players', {
      headers: { 'x-admin-password': pass }
    });

    if (res.status === 401) {
      document.getElementById('login-err').style.display = 'block';
      return;
    }

    adminPass = pass;
    players   = await res.json();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    updateStats();
    renderTable();
  }

  async function fetchPlayers() {
    const res = await fetch('/api/admin/players', {
      headers: { 'x-admin-password': adminPass }
    });
    players = await res.json();
    updateStats();
    renderTable();
    showToast('✅ Refreshed');
  }

  function updateStats() {
    document.getElementById('d-players').textContent = players.length.toLocaleString();
    document.getElementById('d-points').textContent  = players.reduce((a,p)=>a+(p.points||0),0).toLocaleString();
    document.getElementById('d-blocks').textContent  = players.reduce((a,p)=>a+(p.total_blocks||0),0).toLocaleString();
    document.getElementById('d-diamond').textContent = players.filter(p=>(p.pickaxe||0)>=4).length.toLocaleString();
  }

  function renderTable() {
    const search = document.getElementById('search').value.toLowerCase();
    const filtered = players.filter(p =>
      p.nickname?.toLowerCase().includes(search) ||
      p.wallet_address?.toLowerCase().includes(search)
    );

    if (filtered.length === 0) {
      document.getElementById('player-table').innerHTML =
        '<tr><td colspan="8" class="loading">No players found</td></tr>';
      return;
    }

    document.getElementById('player-table').innerHTML = filtered.map((p, i) => {
      const tier      = p.pickaxe || 0;
      const pickColor = PICK_COLORS[tier] || '#aaaaaa';
      const pickName  = PICK_NAMES[tier]  || 'Wood';
      const lastSeen  = p.last_seen ? new Date(p.last_seen).toLocaleDateString() : '-';
      const joined    = p.created_at ? new Date(p.created_at).toLocaleDateString() : '-';
      const wallet    = p.wallet_address || '';

      return `<tr>
        <td style="color:rgba(255,255,255,0.3)">${i+1}</td>
        <td style="font-weight:700">${escHtml(p.nickname||'-')}</td>
        <td>
          <span class="wallet-cell">${wallet.slice(0,8)}...${wallet.slice(-4)}</span>
          <button class="copy-btn" onclick="copyText('${wallet}','Wallet copied!')">copy</button>
        </td>
        <td class="pts-cell">${(p.points||0).toLocaleString()}</td>
        <td class="pick-cell" style="color:${pickColor}">${pickName}</td>
        <td class="time-cell">${(p.total_blocks||0).toLocaleString()}</td>
        <td class="time-cell">${lastSeen}</td>
        <td class="time-cell">${joined}</td>
      </tr>`;
    }).join('');
  }

  function exportWallets() {
    const search   = document.getElementById('search').value.toLowerCase();
    const filtered = players.filter(p =>
      p.nickname?.toLowerCase().includes(search) ||
      p.wallet_address?.toLowerCase().includes(search)
    );
    const text = filtered
      .map(p => `${p.wallet_address} | ${p.nickname} | ${p.points} pts`)
      .join('\n');
    copyText(text, `✅ ${filtered.length} wallet addresses copied!`);
  }

  function exportCSV() {
    const rows = [['Rank','Nickname','Wallet','Points','Pickaxe','Blocks','Last Seen','Joined']];
    players.forEach((p,i) => {
      rows.push([
        i+1,
        p.nickname||'',
        p.wallet_address||'',
        p.points||0,
        PICK_NAMES[p.pickaxe||0]||'Wood',
        p.total_blocks||0,
        p.last_seen ? new Date(p.last_seen).toLocaleDateString() : '',
        p.created_at ? new Date(p.created_at).toLocaleDateString() : ''
      ]);
    });
    const csv  = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type:'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `grindfun-players-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('✅ CSV downloaded');
  }

  function copyText(text, msg) {
    navigator.clipboard.writeText(text).then(()=>showToast(msg||'✅ Copied!')).catch(()=>{});
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  document.getElementById('admin-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
